name: Build InnoExtract (Windows, MSYS2 MinGW)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-xz
            mingw-w64-x86_64-libiconv
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-bzip2
            git
          msystem: MINGW64

      - name: Clone innoextract repository
        shell: msys2 {0}
        run: |
          git clone https://github.com/dscharrer/innoextract.git
          cd innoextract

      - name: Configure build
        shell: msys2 {0}
        run: |
          cd innoextract
          mkdir -p build && cd build
          cmake .. \
            -G "MinGW Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DUSE_LZMA=ON \
            -DUSE_STATIC_LIBS=ON \
            -DLZMA_USE_STATIC_LIBS=ON \
            -DBoost_USE_STATIC_LIBS=ON \
            -DZLIB_USE_STATIC_LIBS=ON \
            -DBZip2_USE_STATIC_LIBS=ON \
            -DBUILD_TESTS=OFF \
            -DRUN_TESTS=OFF \
            -DUSE_LTO=OFF \
            -DSET_OPTIMIZATION_FLAGS=ON

      - name: Build innoextract
        shell: msys2 {0}
        run: |
          cd innoextract/build
          mingw32-make -j$(nproc)

      - name: Test binary
        shell: msys2 {0}
        run: |
          cd innoextract/build
          ./innoextract --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: innoextract-windows-mingw64
          path: innoextract/build/innoextract.exe
