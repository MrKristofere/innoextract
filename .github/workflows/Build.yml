name: Build InnoExtract (Windows, MSYS2 MinGW)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-xz
            mingw-w64-x86_64-libiconv
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-bzip2
            git
          msystem: MINGW64

      - name: Clone innoextract repository
        shell: msys2 {0}
        run: |
          git clone https://github.com/dscharrer/innoextract.git
          cd innoextract

      - name: Configure build
        shell: msys2 {0}
        run: |
          cd innoextract
          mkdir -p build && cd build
          cmake .. \
            -G "MinGW Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DUSE_LZMA=ON \
            -DBUILD_TESTS=OFF \
            -DRUN_TESTS=OFF \
            -DUSE_LTO=OFF

      - name: Build innoextract
        shell: msys2 {0}
        run: |
          cd innoextract/build
          mingw32-make -j$(nproc)

      - name: Collect required DLLs
        shell: msys2 {0}
        run: |
          cd innoextract/build
          # Копируем все необходимые DLL
          cp /mingw64/bin/libwinpthread-1.dll . 2>/dev/null || true
          cp /mingw64/bin/libbz2-1.dll . 2>/dev/null || true
          cp /mingw64/bin/libzstd.dll . 2>/dev/null || true
          cp /mingw64/bin/libz.dll . 2>/dev/null || true
          cp /mingw64/bin/liblzma.dll . 2>/dev/null || true
          cp /mingw64/bin/libiconv-2.dll . 2>/dev/null || true
          cp /mingw64/bin/libstdc++-6.dll . 2>/dev/null || true
          cp /mingw64/bin/libgcc_s_seh-1.dll . 2>/dev/null || true
          # Boost DLL
          cp /mingw64/bin/libboost_*.dll . 2>/dev/null || true

      - name: Create portable package
        shell: msys2 {0}
        run: |
          cd innoextract/build
          mkdir -p portable
          cp innoextract.exe *.dll portable/
          echo "Portable innoextract with all dependencies" > portable/README.txt

      - name: Upload portable artifact
        uses: actions/upload-artifact@v5
        with:
          name: innoextract-windows-portable
          path: innoextract/build/portable/

      - name: Test binary
        shell: msys2 {0}
        run: |
          cd innoextract/build/portable
          ./innoextract --version
